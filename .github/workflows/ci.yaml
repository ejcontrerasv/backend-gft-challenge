name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Docker info
        run: |
          docker version
          docker info

      - name: Gradle test + coverage verification
        run: |
          ./gradlew clean test jacocoTestReport jacocoTestCoverageVerification --no-daemon --stacktrace

      - name: Integration tests
        run: ./gradlew integrationTest --no-daemon --stacktrace

      - name: Code format check
        run: ./gradlew spotlessCheck --no-daemon

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/test-results/test/**
            **/build/reports/tests/test/**

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: |
            **/build/reports/jacoco/test/**

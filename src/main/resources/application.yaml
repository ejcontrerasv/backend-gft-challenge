spring.application.name: code-challenge
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/codechallenge_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-main.yaml

migration:
  dual-write:
    enabled: true
    read-source: LEGACY_ONLY  # Options: NEW_WITH_FALLBACK, NEW_ONLY, LEGACY_ONLYapplication.yaml
  batch-job:
    enabled: false  # Set to true to enable nightly batch migration
    batch-size: 1000
    cron: "0 0 2 * * ?"  # Run at 2 AM daily

logging:
  level:
    de.dkb.api.codeChallenge: DEBUG
    de.dkb.api.codeChallenge.infrastructure.persistence.adapter.DualWriteUserRepositoryAdapter: DEBUG
    de.dkb.api.codeChallenge.domain.service: DEBUG

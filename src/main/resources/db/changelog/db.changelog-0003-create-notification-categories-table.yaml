databaseChangeLog:
  - changeSet:
      id: "0003-create-notification-categories-table"
      author: "joksan.contreras"
      changes:
        - createTable:
            tableName: "notification_categories"
            columns:
              - column:
                  name: "id"
                  type: "varchar(50)"
                  constraints:
                    primaryKey: true
                    primaryKeyName: "pk_notification_category_id"
                    nullable: false
              - column:
                  name: "name"
                  type: "varchar(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "created_at"
                  type: "timestamp"
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
              - column:
                  name: "updated_at"
                  type: "timestamp"
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: "notification_categories"

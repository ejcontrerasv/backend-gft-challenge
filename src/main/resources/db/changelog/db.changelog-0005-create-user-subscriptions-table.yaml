databaseChangeLog:
  - changeSet:
      id: "0005-create-user-subscriptions-table"
      author: "joksan.contreras"
      changes:
        - createTable:
            tableName: "user_subscriptions"
            columns:
              - column:
                  name: "user_id"
                  type: "uuid"
                  constraints:
                    nullable: false
              - column:
                  name: "category_id"
                  type: "varchar(50)"
                  constraints:
                    nullable: false
                    foreignKeyName: "fk_user_subscription_category"
                    references: "notification_categories(id)"
              - column:
                  name: "subscribed_at"
                  type: "timestamp"
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
              - column:
                  name: "active"
                  type: "boolean"
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: "user_subscriptions"
            columnNames: "user_id, category_id"
            constraintName: "pk_user_subscription"
        - createIndex:
            indexName: "idx_user_subscriptions_category"
            tableName: "user_subscriptions"
            columns:
              - column:
                  name: "category_id"
        - createIndex:
            indexName: "idx_user_subscriptions_user"
            tableName: "user_subscriptions"
            columns:
              - column:
                  name: "user_id"
      rollback:
        - dropTable:
            tableName: "user_subscriptions"
